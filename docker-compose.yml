name: hybrid-rag

services:

  nginx:
    image: nginx:alpine
    ports:
      - "8085:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    expose:
      - "8000"
    volumes:
      - hf_models:/app/models        # Named volume — HF models survive redeploys
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 800M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s              # HF model cold load takes 30-60s
    command: >
      sh -c "alembic upgrade head && uvicorn main:app --host 0.0.0.0 --port 8000 --workers 1"

  db:
    image: postgres:16-alpine
    env_file: .env
    expose:
      - "5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  rag-chatbot:
    image: hybrid-rag-rag-chatbot
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    expose:
      - "8001"
    volumes:
      - hf_models:/app/models
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 800M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/rag/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    command: >
      uvicorn rag_chatbot_main:app --host 0.0.0.0 --port 8001 --workers 1

volumes:
  hf_models:    # Persists HuggingFace models across redeploys
